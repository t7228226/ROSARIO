<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站點規則設定 - 管理系統</title>
    <style>
        /* 基礎版面美化 (CSS) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        /* 表單區域美化 */
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .input-box {
            flex: 1;
            min-width: 120px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        /* 清單表格美化 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #3498db;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .status-msg {
            color: #d35400;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 站點規則設定</h1>
    
    <h2>1. 新增站點規則</h2>
    <form id="addRuleForm">
        <div class="form-group">
            <div class="input-box">
                <label>站點名稱</label>
                <input type="text" id="stationName" placeholder="例如: STR" required>
            </div>
            <div class="input-box">
                <label>正班最低人數</label>
                <input type="number" id="minRegular" min="0" placeholder="例如: 4" required>
            </div>
            <div class="input-box">
                <label>輪休單批最低</label>
                <input type="number" id="minRotation" min="0" placeholder="例如: 2" required>
            </div>
            <div class="input-box">
                <label>排班優先序</label>
                <input type="number" id="priority" min="1" placeholder="數字越小越優先" required>
            </div>
            <div class="input-box">
                <label>是否必站</label>
                <select id="isMandatory" required>
                    <option value="Y">Y (必站)</option>
                    <option value="N">N (非必站)</option>
                </select>
            </div>
            <div class="input-box">
                <label>備援目標人數</label>
                <input type="number" id="backupTarget" min="0" placeholder="例如: 4" required>
            </div>
        </div>
        <button type="submit" id="submitBtn">➕ 新增寫入資料庫</button>
        <span id="formStatus" class="status-msg" style="margin-left: 15px;"></span>
    </form>

    <h2 style="margin-top: 40px;">2. 目前站點規則清單</h2>
    <div id="tableStatus" class="status-msg">正在從 Google 表格讀取最新資料中，請稍候...</div>
    <table>
        <thead>
            <tr>
                <th>站點名稱</th>
                <th>正班最低人數</th>
                <th>輪休單批最低</th>
                <th>排班優先序</th>
                <th>是否必站</th>
                <th>備援目標人數</th>
            </tr>
        </thead>
        <tbody id="rulesTableBody">
            </tbody>
    </table>
</div>

<script>
    // 這裡就是你專屬的 Google Apps Script API 網址
    const API_URL = "https://script.google.com/macros/s/AKfycbwsqvP9ogL4v81T3luON_43aHt1Vdz-e3bT--sEH2n56eKj11z05FPhkCC4rFouwt4w_A/exec";

    // 網頁載入完成後，立刻執行讀取資料的動作
    document.addEventListener("DOMContentLoaded", function() {
        loadRulesData();
    });

    // 功能一：從 Google 表格讀取資料並顯示在表格中
    async function loadRulesData() {
        const tableBody = document.getElementById("rulesTableBody");
        const tableStatus = document.getElementById("tableStatus");
        
        try {
            // 發送請求給 API
            const response = await fetch(API_URL);
            const data = await response.json();
            
            // 清空目前的表格內容
            tableBody.innerHTML = "";
            
            if (data.length === 0) {
                tableStatus.textContent = "目前雲端資料庫中沒有任何站點規則，請從上方新增。";
                return;
            }

            // 將抓取到的資料一筆一筆畫成表格的列 (tr)
            data.forEach(rule => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><strong>${rule.stationName}</strong></td>
                    <td>${rule.minRegular}</td>
                    <td>${rule.minRotation}</td>
                    <td>${rule.priority}</td>
                    <td>${rule.isMandatory}</td>
                    <td>${rule.backupTarget}</td>
                `;
                tableBody.appendChild(row);
            });
            
            tableStatus.textContent = "✅ 資料讀取完成！(與 Google 表格同步)";
            // 3秒後隱藏成功訊息
            setTimeout(() => { tableStatus.textContent = ""; }, 3000);

        } catch (error) {
            console.error("讀取失敗:", error);
            tableStatus.textContent = "❌ 讀取資料失敗，請檢查網路連線或 API 網址設定。";
        }
    }

    // 功能二：攔截表單送出，將新資料寫入 Google 表格
    document.getElementById("addRuleForm").addEventListener("submit", async function(event) {
        event.preventDefault(); // 防止網頁重新整理
        
        const submitBtn = document.getElementById("submitBtn");
        const formStatus = document.getElementById("formStatus");
        
        // 收集使用者輸入的資料
        const newRuleData = {
            stationName: document.getElementById("stationName").value,
            minRegular: document.getElementById("minRegular").value,
            minRotation: document.getElementById("minRotation").value,
            priority: document.getElementById("priority").value,
            isMandatory: document.getElementById("isMandatory").value,
            backupTarget: document.getElementById("backupTarget").value
        };

        // 鎖定按鈕，防止重複點擊
        submitBtn.disabled = true;
        submitBtn.textContent = "⏳ 資料寫入中...";
        formStatus.textContent = "";

        try {
            // 使用 POST 方法將資料送到 API
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(newRuleData)
            });

            // 寫入成功後的動作
            formStatus.textContent = "✅ 新增成功！資料已寫入 Google 表格。";
            document.getElementById("addRuleForm").reset(); // 清空表單
            
            // 重新讀取最新的表格資料
            loadRulesData();

        } catch (error) {
            console.error("寫入失敗:", error);
            formStatus.textContent = "❌ 新增失敗，請稍後再試。";
        } finally {
            // 解除按鈕鎖定
            submitBtn.disabled = false;
            submitBtn.textContent = "➕ 新增寫入資料庫";
            setTimeout(() => { formStatus.textContent = ""; }, 4000);
        }
    });
</script>

</body>
</html>
