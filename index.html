<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>站點資格管理 App</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #f4f7fb;
        color: #172033;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      }
      #boot-status {
        padding: 24px;
        line-height: 1.7;
      }
      #boot-status.error {
        background: #fff7f7;
        color: #7f1d1d;
      }
      #boot-status pre {
        white-space: pre-wrap;
        background: #fff;
        border: 1px solid #fecaca;
        border-radius: 12px;
        padding: 12px;
        overflow: auto;
      }
      #schedule-floating-status {
        position: fixed;
        right: 18px;
        top: 92px;
        z-index: 9999;
        display: none;
        padding: 10px 14px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.92);
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.55;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.22);
      }
      #schedule-floating-status.show {
        display: block;
      }
      @media (max-width: 900px) {
        #schedule-floating-status {
          top: auto;
          right: 14px;
          bottom: 86px;
        }
      }
    </style>
    <script>
      (function () {
        function ensureBootStatus() {
          var el = document.getElementById('boot-status');
          if (!el) {
            el = document.createElement('div');
            el.id = 'boot-status';
            el.innerHTML = '<h1>系統啟動中</h1><p>若長時間停在此畫面，請把畫面截圖提供給我。</p>';
            document.addEventListener('DOMContentLoaded', function () {
              var root = document.getElementById('root');
              if (root && !document.getElementById('boot-status')) {
                root.before(el);
              } else if (!root && document.body && !document.getElementById('boot-status')) {
                document.body.prepend(el);
              }
            });
          }
          return el;
        }

        function showEarlyError(title, detail) {
          var el = ensureBootStatus();
          el.className = 'error';
          el.innerHTML = '<h1>' + title + '</h1><p>請把下方錯誤截圖提供給我。</p><pre>' + String(detail || '') + '</pre>';
        }

        window.__hideBootStatus = function () {
          var el = document.getElementById('boot-status');
          if (el) el.style.display = 'none';
        };

        window.__showBootError = showEarlyError;

        window.addEventListener('error', function (event) {
          showEarlyError('系統啟動失敗', (event.message || '') + '\n' + (event.filename || '') + ':' + (event.lineno || 0) + ':' + (event.colno || 0));
        });

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event.reason;
          var detail = typeof reason === 'object' ? JSON.stringify(reason, null, 2) : String(reason);
          showEarlyError('系統啟動失敗', detail);
        });

        setTimeout(function () {
          var el = document.getElementById('boot-status');
          if (el && el.style.display !== 'none' && !el.classList.contains('error')) {
            showEarlyError('系統啟動逾時', '主程式在預期時間內未完成載入。這通常代表入口模組或打包後資產未成功載入。');
          }
        }, 4000);

        ensureBootStatus();
      })();
    </script>
  </head>
  <body>
    <div id="boot-status">
      <h1>系統啟動中</h1>
      <p>若長時間停在此畫面，請把畫面截圖提供給我。</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        function escapeHtml(value) {
          return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
        }

        function getSummaryCards() {
          return Array.prototype.slice.call(document.querySelectorAll('.summary-card')).map(function (card) {
            var label = card.querySelector('span');
            var value = card.querySelector('strong');
            return {
              card: card,
              label: label,
              value: value,
              labelText: label ? String(label.textContent || '').trim() : '',
              valueNumber: value ? Number(String(value.textContent || '0').trim()) : 0
            };
          });
        }

        function normalizeCandidateCards() {
          document.querySelectorAll('.list-scroll.short .list-row').forEach(function (button) {
            var meta = button.querySelector('span');
            if (!meta) return;
            var raw = meta.textContent || '';
            var parts = raw.split('｜').map(function (part) { return part.trim(); }).filter(Boolean);
            if (parts.length < 2) return;
            var next = '<span class="candidate-code">' + escapeHtml(parts[0]) + '</span><span class="candidate-team">' + escapeHtml(parts[1]) + '</span>';
            if (meta.innerHTML !== next) meta.innerHTML = next;
          });
        }

        function normalizeSummary() {
          var cards = getSummaryCards();
          if (!cards.length) return;
          var byLabel = function (labels) {
            var found = cards.find(function (item) { return labels.indexOf(item.labelText) >= 0; });
            return found && Number.isFinite(found.valueNumber) ? found.valueNumber : 0;
          };
          var required = byLabel(['需排總人數', '出勤總人數']);
          var assigned = byLabel(['已排總人數']);
          var support = byLabel(['支援人力', '支援人數']);
          var pending = Math.max(0, required - assigned);

          cards.forEach(function (item) {
            if (!item.label || !item.value) return;
            if (item.labelText === '需排總人數' || item.labelText === '出勤總人數') {
              item.label.textContent = '出勤總人數';
            }
            if (item.labelText === '唯一人數' || item.labelText === '尚未安排人數') {
              item.label.textContent = '尚未安排人數';
              item.value.textContent = String(pending);
            }
            if (item.labelText === '重複安排' || item.labelText === '支援人數') {
              item.label.textContent = '支援人數';
              item.value.textContent = String(support);
            }
          });

          var floating = document.getElementById('schedule-floating-status');
          if (!floating) {
            floating = document.createElement('div');
            floating.id = 'schedule-floating-status';
            document.body.appendChild(floating);
          }
          if (assigned > 0) {
            floating.innerHTML = '<div>已排:' + assigned + '</div><div>待排:' + pending + '</div>';
            floating.classList.add('show');
          } else {
            floating.classList.remove('show');
            floating.innerHTML = '';
          }
        }

        function normalizeScheduleUi() {
          normalizeCandidateCards();
          normalizeSummary();
        }

        var raf = 0;
        function scheduleNormalize() {
          cancelAnimationFrame(raf);
          raf = requestAnimationFrame(normalizeScheduleUi);
        }
        window.addEventListener('load', scheduleNormalize);
        document.addEventListener('click', function () { setTimeout(scheduleNormalize, 0); }, true);
        document.addEventListener('change', function () { setTimeout(scheduleNormalize, 0); }, true);
        var observer = new MutationObserver(scheduleNormalize);
        observer.observe(document.documentElement, { childList: true, subtree: true, characterData: true });
        setInterval(normalizeScheduleUi, 500);
      })();
    </script>
  </body>
</html>
