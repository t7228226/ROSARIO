const $=s=>document.querySelector(s); const $$=s=>Array.from(document.querySelectorAll(s));
const state={mode:'第一天',view:'person',person:'',site:'',needType:'rest',singleSite:'',random:null};
$('#src').textContent=DATA.source;
const peopleByName=Object.fromEntries(DATA.people.map(p=>[p.name,p]));
const peopleById=Object.fromEntries(DATA.people.map(p=>[p.id,p]));
const sitesByName=Object.fromEntries(DATA.sites.map(s=>[s.name,s]));
const siteOrder=[...DATA.sites].sort((a,b)=>(a.priority??999)-(b.priority??999)||a.name.localeCompare(b.name,'zh-Hant'));
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function canDo(name,site){const v=(DATA.matrix[name]||{})[site]||''; return v==='✓'||v==='師';}
function isTraining(name,site){return ((DATA.matrix[name]||{})[site]||'')==='T';}
function skillCount(name){return DATA.sites.reduce((n,s)=>n+(canDo(name,s.name)?1:0),0);}
function personOK(p,mode){if(!p||p.status!=='在職'||p.role==='主任')return false; if(mode==='B班')return p.class==='B班'; if(mode==='第一天')return (p.class==='A班'&&p.day1==='Y')||p.class==='B班'; return (p.class==='A班'&&p.day2==='Y')||p.class==='B班';}
function modeRank(p,mode){if(mode==='B班')return 0; if(p.class==='A班')return 0; if(p.class==='B班')return 1; return 2;}
function eligible(mode=state.mode){return DATA.people.filter(p=>personOK(p,mode)).map(p=>({...p,skillCount:skillCount(p.name)}));}
function siteNeed(site,needType=state.needType){const s=sitesByName[site]; if(!s)return 0; return needType==='regular'?s.minRegular:s.minRest*2;}
function candidates(site,mode=state.mode,assigned=new Set()){return eligible(mode).filter(p=>!assigned.has(p.name)&&canDo(p.name,site)).sort((a,b)=>modeRank(a,mode)-modeRank(b,mode)||a.skillCount-b.skillCount||a.row-b.row);}
function shuffle(a){const x=[...a]; for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];} return x;}
function groupCandidates(site,mode=state.mode,assigned=new Set()){const e=eligible(mode).filter(p=>!assigned.has(p.name)&&canDo(p.name,site)); if(mode==='B班')return shuffle(e); const a=e.filter(p=>p.class==='A班'); const b=e.filter(p=>p.class==='B班'); return [...shuffle(a),...shuffle(b)];}
function deterministicAssign(mode=state.mode,needType=state.needType){const assigned=new Set(), out={}; for(const s of siteOrder){const need=siteNeed(s.name,needType); const pick=[]; for(const p of candidates(s.name,mode,assigned)){if(pick.length>=need)break; pick.push(p); assigned.add(p.name);} out[s.name]={need,pick,gap:Math.max(0,need-pick.length)};} return out;}
function randomAssign(mode=state.mode,needType=state.needType){const assigned=new Set(), out={}; for(const s of siteOrder){const need=siteNeed(s.name,needType); const pick=[]; for(const p of groupCandidates(s.name,mode,assigned)){if(pick.length>=need)break; pick.push(p); assigned.add(p.name);} out[s.name]={need,pick,gap:Math.max(0,need-pick.length)};} return out;}
function trainingList(site){return eligible().filter(p=>isTraining(p.name,site)).sort((a,b)=>a.skillCount-b.skillCount||a.row-b.row);}
function statusPill(txt){txt=String(txt||''); if(txt.includes('不足')||txt.includes('缺'))return `<span class="pill red">${esc(txt)}</span>`; if(txt.includes('無人'))return `<span class="pill gray">${esc(txt)}</span>`; if(txt.includes('剛好'))return `<span class="pill yellow">${esc(txt)}</span>`; return `<span class="pill green">${esc(txt||'正常')}</span>`;}
function gapRow(site){return DATA.gapRows.find(g=>g.site===site)||{};}
function personCardsHtml(){
 const q=state.person.trim();
 const people=DATA.people.filter(p=>!q||p.name.includes(q)||p.id.toLowerCase().includes(q.toLowerCase())).slice(0,80);
 return `${people.map(p=>{const m=DATA.matrix[p.name]||{}; const ok=DATA.sites.filter(s=>canDo(p.name,s.name)); const t=DATA.sites.filter(s=>isTraining(p.name,s.name)); const active=personOK(p,state.mode); return `<div class="card ${active?'ok':'warn'}"><div class="siteTitle"><h3>${esc(p.name)}</h3><span class="pill ${active?'green':'gray'}">${active?'目前模式可用':'目前模式不可用'}</span></div><p class="small">${esc(p.id)}｜${esc(p.class)}｜${esc(p.role)}｜${esc(p.nationality)}｜${esc(p.status)}</p><div class="grid"><div class="kpi"><span class="small">可上線站點</span><b>${ok.length}</b></div><div class="kpi"><span class="small">訓練中</span><b>${t.length}</b></div></div><div class="sectionTitle">可上線</div><div class="assign">${ok.map(s=>`<span class="pill ${m[s.name]==='師'?'purple':'green'}">${esc(s.name)}${m[s.name]==='師'?'｜師':''}</span>`).join('')||'<span class="small">無</span>'}</div>${t.length?`<div class="sectionTitle">訓練中</div><div class="assign">${t.map(s=>`<span class="pill yellow">${esc(s.name)}｜T</span>`).join('')}</div>`:''}</div>`}).join('')||'<div class="card empty">找不到人員</div>'}`;
}
function updatePersonResults(){const box=$('#personResults'); if(box)box.innerHTML=personCardsHtml();}
function renderPerson(){
 const existing=$('#personQ');
 if(existing){ existing.value=state.person; updatePersonResults(); return; }
 $('#view-person').innerHTML=`
 <div class="card"><label>輸入姓名或工號</label><input id="personQ" value="${esc(state.person)}" placeholder="例：周慶峰 / P0242" autocomplete="off" autocorrect="off" autocapitalize="off" enterkeyhint="search"><p class="small">顯示該人已具備資格的站點；只有 ✓ 與 師 會列為可上線，T 為訓練中。</p></div>
 <div id="personResults">${personCardsHtml()}</div>`;
 $('#personQ').oninput=e=>{state.person=e.target.value; updatePersonResults();};
}
function renderSite(){const selected=state.site||DATA.sites[0].name; const s=sitesByName[selected]||DATA.sites[0]; state.site=s.name; const g=gapRow(s.name); const allCand=candidates(s.name); const train=trainingList(s.name); const dReg=deterministicAssign(state.mode,'regular')[s.name]; const dRest=deterministicAssign(state.mode,'rest')[s.name]; $('#view-site').innerHTML=`
 <div class="card"><label>選擇站點</label><select id="siteSel">${DATA.sites.map(x=>`<option ${x.name===s.name?'selected':''}>${esc(x.name)}</option>`).join('')}</select></div>
 <div class="card ${dReg.gap||dRest.gap?'danger':'ok'}"><div class="siteTitle"><h3>${esc(s.name)}</h3><span class="pill blue">優先序 ${esc(s.priority)}</span></div><p class="small">07 補位重點：${esc(g.focus||'')}</p><div class="grid"><div class="kpi"><span class="small">正班最低</span><b>${s.minRegular}</b></div><div class="kpi"><span class="small">輪休安全需求</span><b>${s.minRest*2}</b></div></div><p>${statusPill(`07正班：${g.regularStatus07||'正常'}`)} ${statusPill(`07輪休：${g.restStatus07||'正常'}`)}</p></div>
 <div class="card"><div class="grid"><div class="kpi"><span class="small">目前模式可上線</span><b>${allCand.length}</b></div><div class="kpi"><span class="small">訓練中</span><b>${train.length}</b></div></div></div>
 <div class="sectionTitle">符合資格人員（✓ / 師）</div><div class="card"><div class="assign">${allCand.map(p=>`<span class="pill green">${esc(p.name)}｜${p.skillCount}站</span>`).join('')||'<span class="small">無</span>'}</div></div>
 <div class="sectionTitle">07 過度依賴 / 共享人力</div><div class="card"><div class="assign">${(g.dependency||[]).map(x=>`<span class="pill yellow">${esc(x)}</span>`).join('')||'<span class="small">無</span>'}</div><p class="small">多站支援人力：${g.multiSupport??0} 人；表面可上線：${g.surfaceOnline??0} 人</p></div>
 ${train.length?`<div class="sectionTitle">訓練中人員</div><div class="card"><div class="assign">${train.map(p=>`<span class="pill yellow">${esc(p.name)}｜${p.skillCount}站</span>`).join('')}</div></div>`:''}`; $('#siteSel').onchange=e=>{state.site=e.target.value; renderSite();};}
function runRandom(){state.random={mode:state.mode,needType:state.needType,created:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),assign:randomAssign(state.mode,state.needType)}; renderRandom();}
function randomOne(){const site=state.singleSite||DATA.sites[0].name; const pool=groupCandidates(site,state.mode,new Set()); const need=siteNeed(site,state.needType); state.random={mode:state.mode,needType:state.needType,created:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),assign:{[site]:{need,pick:pool.slice(0,need),gap:Math.max(0,need-pool.length)}}}; renderRandom();}
function renderRandom(){const assign=state.random?.assign||deterministicAssign(state.mode,state.needType); const isRand=!!state.random; const totalNeed=DATA.sites.reduce((n,s)=>n+siteNeed(s.name,state.needType),0); const totalPick=Object.values(assign).reduce((n,x)=>n+(x.pick?.length||0),0); const gaps=Object.entries(assign).filter(([_,x])=>x.gap>0); $('#view-random').innerHTML=`
 <div class="card info"><div class="siteTitle"><h3>隨機站點配置</h3><span class="pill ${isRand?'purple':'blue'}">${isRand?'隨機結果':'少站優先參考'}</span></div><p class="small">邏輯：依 07/02 的站點需求與排班優先序配置；人員必須在職、非主任、符合目前模式，且該站點資格為 ✓ 或 師。單次配置中同一人不重複派站。</p><label>配置需求</label><select id="needType"><option value="regular" ${state.needType==='regular'?'selected':''}>正班最低</option><option value="rest" ${state.needType==='rest'?'selected':''}>輪休安全需求（單批最低 × 2）</option></select><div class="toolbar"><button class="btn primary" id="runRandom">全站隨機配置</button><button class="btn secondary" id="clearRandom">恢復少站優先</button></div></div>
 <div class="card"><label>單一站點抽人</label><select id="singleSite">${DATA.sites.map(s=>`<option ${s.name===(state.singleSite||DATA.sites[0].name)?'selected':''}>${esc(s.name)}</option>`).join('')}</select><button class="btn full secondary" id="oneRandom">只抽這個站點</button></div>
 <div class="card"><div class="grid3"><div class="kpi"><span class="small">模式</span><b style="font-size:16px">${esc(state.mode)}</b></div><div class="kpi"><span class="small">已派/需求</span><b>${totalPick}/${totalNeed}</b></div><div class="kpi"><span class="small">缺口站</span><b>${gaps.length}</b></div></div>${isRand?`<p class="small">產生時間：${state.random.created}</p>`:''}</div>
 ${siteOrder.map(s=>{const a=assign[s.name]||{need:siteNeed(s.name),pick:[],gap:siteNeed(s.name)}; const g=gapRow(s.name); return `<div class="card ${a.gap?'danger':'ok'}"><div class="siteTitle"><h3>${esc(s.name)}</h3><span class="pill ${a.gap?'red':'green'}">${a.pick.length}/${a.need}${a.gap?' 缺 '+a.gap:''}</span></div><p class="small">07：${esc(g.focus||'')}｜正班缺 ${g.regularGap07??0}｜輪休缺 ${g.restGap07??0}</p><div class="assign">${a.pick.map(p=>`<span class="pill green">${esc(p.name)}｜${p.class}｜${p.skillCount}站</span>`).join('')||'<span class="small">此站無需求或無可派人員</span>'}</div>${a.gap?`<p class="small">缺口原因通常是：合格人員不足，或已被更高優先序站點用掉。</p>`:''}</div>`}).join('')}`;
 $('#needType').onchange=e=>{state.needType=e.target.value; state.random=null; renderRandom();}; $('#runRandom').onclick=runRandom; $('#clearRandom').onclick=()=>{state.random=null;renderRandom();}; $('#singleSite').onchange=e=>{state.singleSite=e.target.value;}; $('#oneRandom').onclick=randomOne;}
function render(){if(state.view==='person')renderPerson(); if(state.view==='site')renderSite(); if(state.view==='random')renderRandom();}
function switchView(v){state.view=v; ['person','site','random'].forEach(x=>$('#view-'+x).classList.toggle('hidden',x!==v)); $$('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); render();}
$$('.mode button').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode; state.random=null; $$('.mode button').forEach(x=>x.classList.toggle('active',x===b)); render();});
$$('.nav button').forEach(b=>b.onclick=()=>switchView(b.dataset.view));
render();
</script>
</body>
</html>
